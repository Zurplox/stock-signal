name: Intraday signals (market hours)

# NOTE: For TRUE non-stop day trading, run locally:  python day_trader.py TSLA AAPL
# GitHub Actions cannot run continuously (cron fires at most every ~5 min and is
# often delayed). This workflow is a best-effort cloud fallback: it runs a single
# pass every 5 minutes during US market hours and publishes report.html.

on:
  schedule:
    # every 5 min, 13:30-20:00 UTC (US market 9:30am-4:00pm ET), Mon-Fri
    - cron: "*/5 13-19 * * 1-5"
    - cron: "30-59/5 13 * * 1-5"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python day_trader.py --once TSLA AAPL NVDA MSFT
      - name: Save report
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add report.html
          git commit -m "Intraday signals $(date -u +'%F %H:%M')" || echo "no changes"
          git push
